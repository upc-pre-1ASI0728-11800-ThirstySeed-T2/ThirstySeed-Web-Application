<div class="app-layout">

  <app-sidebar></app-sidebar>

  <main class="content">

    <!-- router-outlet is ALWAYS in the DOM so child routes can render -->
    <router-outlet></router-outlet>

    <!-- Checking overlay (only while verifying, not on plan page) -->
    <div *ngIf="showChecking" class="sub-overlay sub-checking">
      <div class="gate-card gate-card--slim">
        <div class="sub-spinner"></div>
        <p>Verifying your plan…</p>
      </div>
    </div>

    <!-- Subscription gate overlay (covers content, sidebar stays visible) -->
    <div *ngIf="showGate" class="sub-overlay sub-gate">
      <div class="gate-card">

        <div class="gate-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#127937" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22V12"/>
            <path d="M12 12C12 7 7 4 3 5c0 5 4 8 9 7"/>
            <path d="M12 12c0-5 5-8 9-7-1 5-5 8-9 7"/>
          </svg>
        </div>

        <h1 class="gate-title">Activate your plan to get started</h1>
        <p class="gate-sub">{{ gateSubtitle }}</p>

        <div class="gate-plans">
          <div class="gate-plan" *ngFor="let plan of plans">
            <div class="gate-plan-header">
              <span class="gate-plan-name">{{ plan.name }}</span>
              <span class="gate-plan-price">${{ plan.price }}<span class="gate-plan-period">/mo</span></span>
            </div>
            <p class="gate-plan-highlight">{{ plan.highlight }}</p>
            <ul class="gate-plan-features">
              <li *ngFor="let f of plan.features">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                {{ f }}
              </li>
            </ul>
          </div>
        </div>

        <button class="gate-btn-primary" (click)="goToPlans()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          Choose a plan
        </button>

        <button class="gate-btn-logout" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log out
        </button>

      </div>
    </div>

  </main>

</div>
